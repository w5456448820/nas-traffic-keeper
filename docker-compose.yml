#  Version : 2.9.2
# =========================================================
services:
  traffic-keeper:
    image: python:3.12-alpine
    container_name: traffic-keeper
    restart: always
    working_dir: /app
    volumes:
      # 主程序脚本（只读）
      - ./traffic-keeper.sh:/app/traffic-keeper.sh:ro
      - ./fetch-links.sh:/app/fetch-links.sh:ro
      - ./webserver.py:/app/webserver.py:ro
      - ./entrypoint.sh:/app/entrypoint.sh:ro

      # 环境变量文件
      - ./.env:/app/.env

      # 持久化数据目录（链接文件存储在 data/links/ 下）
      - ./data:/app/data
      - ./流量统计:/app/流量统计

      # 同步宿主机时区
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: 3
    tmpfs:
      - /tmp
    command: ["/bin/sh", "/app/entrypoint.sh"]
