services:
  traffic-keeper:
    image: alpine:3.23
    container_name: traffic-keeper
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - ./data:/app/data
      - ./流量统计:/app/流量统计
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: 3
    tmpfs:
      - /tmp
    command: ["/bin/sh", "/app/traffic-keeper.sh"]
