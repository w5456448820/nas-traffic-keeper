services:
  traffic-keeper:
    image: alpine:3.23
    container_name: traffic-keeper
    restart: on-failure:5
    working_dir: /app
    volumes:
      - ./traffic-keeper.sh:/app/traffic-keeper.sh:ro
      - ./fetch-links.sh:/app/fetch-links.sh:ro
      - ./data:/app/data
      - ./流量统计:/app/流量统计
      - links:/app/links
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: 3
    tmpfs:
      - /tmp
    command: ["/bin/sh", "/app/traffic-keeper.sh"]

volumes:
  links:
